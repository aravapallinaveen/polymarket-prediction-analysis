version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: polymarket_analysis
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${RDS_PASSWORD:-polymarket_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../scripts/bootstrap_db.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
    environment:
      RDS_HOST: postgres
      RDS_PORT: 5432

  dashboard:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api

  airflow:
    image: apache/airflow:2.8.1
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://admin:${RDS_PASSWORD:-polymarket_dev}@postgres/airflow
    volumes:
      - ../../airflow/dags:/opt/airflow/dags
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
